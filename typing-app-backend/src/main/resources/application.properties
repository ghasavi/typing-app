spring.application.name=Typingapp

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/typing_app
spring.datasource.username=springuser
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

server.port=8081

google.client.id=286336470111-jv5lj14s43ftpafrofq1fudu3d3lsnk5.apps.googleusercontent.com


# EMAIL CONFIGURATION

spring.mail.host=smtp.gmail.com
spring.mail.port=587

spring.mail.username=YOUR_GMAIL@gmail.com
spring.mail.password=YOUR_16_CHARACTER_APP_PASSWORD

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

logging.level.org.springframework.security=TRACE